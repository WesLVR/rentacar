server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: vehiculo-ms
          uri: lb://vehiculoMS
          predicates:
            - Path=/api/v1/vehiculos/**
        - id: cliente-ms
          uri: lb://clienteMS
          predicates:
            - Path=/api/v1/clientes/**
        - id: empleado-ms
          uri: lb://empleadoMS
          predicates:
            - Path=/api/v1/empleados/**
        - id: categoria-ms
          uri: lb://categoriaVehiculoMS
          predicates:
            - Path=/api/v1/categorias/**
        - id: reserva-ms
          uri: lb://reservaMS
          predicates:
            - Path=/api/v1/reservas/**
        - id: pago-ms
          uri: lb://pagoMS
          predicates:
            - Path=/api/v1/pagos/**
        - id: disponibilidad-ms
          uri: lb://disponibilidadMS
          predicates:
            - Path=/api/v1/disponibilidad/**
        - id: mantenimiento-ms
          uri: lb://mantenimientoMS
          predicates:
            - Path=/api/v1/mantenimientos/**
        - id: entrega-ms
          uri: lb://entregaMS
          predicates:
            - Path=/api/v1/entregas/**
        - id: reporte-ms
          uri: lb://reporteMS
          predicates:
            - Path=/api/v1/reportes/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
